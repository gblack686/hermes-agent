<script>
const snapshot = JSON.parse(document.getElementById("snapshot").textContent);

function esc(v){ return String(v ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(v){ if(v === null || v === undefined || v === "") return "-"; if(typeof v === "object") return JSON.stringify(v); return String(v); }

function renderHero(){ const cfg = snapshot.dashboards[active] || {}; const tables = currentTables(); const rows = tables.reduce((n,t) => n + t.rows.length, 0); const available = tables.filter(t => !t.error || t.rows.length).length; document.getElementById("title").textContent = cfg.title || active; document.getElementById("subtitle").textContent = cfg.subtitle || ""; document.getElementById("status").innerHTML = [`${rows} rows loaded`, `${available}/${tables.length} tables available`, snapshot.live ? "live Supabase snapshot" : "offline shell"].map(x => `<span class="pill">${esc(x)}</span>`).join(""); document.getElementById("meta").innerHTML = `Generated ${esc(compactDate(snapshot.generated_at))} · ${snapshot.window_days} day window · ${snapshot.row_limit} row limit per table`; }

function renderTable(table){ const rows = table.rows.filter(rowMatches); if(!rows.length){ const msg = table.error ? `<span class="err">${esc(table.error)}</span>` : "No rows match the current filters."; return `<div class="empty">${msg}</div>`; } const columns = Object.keys(rows[0]).slice(0, 10); return `<div class="table-wrap"><table><thead><tr>${columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${columns.map(c => `<td>${esc(fmt(row[c]))}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`; }

  report_url:"Report", skill_name:"Skill", error_message:"Error", auto_triggered:"Auto",
  last_run_at:"Last Run", duration_sec:"Duration", tests_total:"Tests", tests_passed:"Passed",
  tests_failed:"Failed", retrieval_created_at:"Retrieved", query_count:"Queries", components_scanned:"Scanned",
  match_count:"Matches", returned_count:"Returned", retrieval_path:"Path", event_created_at:"Created",
  recommendation_count:"Recommendations", event_path:"Path", shop_name:"Shop", shop_url:"URL",
  run_after:"Run After", max_attempts:"Max", claimed_by:"Worker", claimed_at:"Claimed",
  scraped_at:"Scraped", product_count:"Products", change_type:"Change", product_sku:"SKU",
  change_pct:"Change %", detected_at:"Detected", trace_name:"Trace", trace_timestamp:"Timestamp",
  latency_sec:"Latency", total_cost:"Cost", total_tokens:"Tokens", observation_count:"Observations",
  langfuse_url:"Langfuse", client_slug:"Client", repo_slug:"Repo", modified_at:"Modified",
  content_mode:"Mode", captured_bytes:"Captured"
};
function label(v){ return labelMap[v] || String(v).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()); }
function short(v, max=90){ const text = fmt(v); return text.length > max ? `${text.slice(0, max - 1)}...` : text; }
function statusClass(v){ const s = String(v ?? "").toLowerCase(); if(["ok","pass","passed","done","applied","active","true","pr_opened"].includes(s)) return "good"; if(["fail","failed","error","timeout","cancelled","false"].includes(s)) return "bad"; if(["pending","running","partial","skipped","noop","draft","paused","metadata","truncated","tail"].includes(s)) return "warn"; return ""; }
function renderValue(key, value){ if(value === null || value === undefined || value === "") return "-"; const lower = String(key).toLowerCase(); const text = short(value, lower.includes("summary") || lower.includes("path") || lower.includes("error") ? 150 : 80); if(lower.includes("url") && String(value).startsWith("http")) return `<a class="cell-link" href="${esc(value)}" target="_blank" rel="noreferrer">${esc(text)}</a>`; if(lower === "status" || lower.includes("status") || lower === "active" || lower === "content_mode" || lower === "change_type") return `<span class="status-chip ${statusClass(value)}">${esc(fmt(value))}</span>`; if(lower.includes("_at") || lower.includes("timestamp")) return esc(compactDate(value)); return esc(text); }
function healthCounts(tables){ let good=0, warn=0, bad=0; for(const table of tables){ for(const [key, val] of Object.entries(table.summary.status_counts || {})){ const cls = statusClass(key); if(cls === "good") good += val; else if(cls === "bad") bad += val; else warn += val; } } return {good,warn,bad}; }
function renderOverview(){ const tables = currentTables(); const rows = tables.reduce((n,t) => n + t.rows.length, 0); const available = tables.filter(t => !t.error || t.rows.length).length; const latest = tables.map(t => t.summary.latest).filter(Boolean).sort((a,b) => new Date(b) - new Date(a))[0]; const h = healthCounts(tables); document.getElementById("overview").innerHTML = [`<strong>${rows}</strong><span>Total rows in view</span>`,`<strong>${available}/${tables.length}</strong><span>Tables responding</span>`,`<strong>${h.bad}</strong><span>Failure-like statuses</span>`,`<strong>${esc(compactDate(latest))}</strong><span>Latest event</span>`].map(x => `<div class="overview-card">${x}</div>`).join(""); }
function renderBars(title, counts){ const entries = Object.entries(counts || {}).slice(0, 6); if(!entries.length) return `<div class="chart"><div class="chart-title">${esc(title)}</div><div class="empty">No grouped values yet.</div></div>`; const max = Math.max(...entries.map(([,v]) => v), 1); return `<div class="chart"><div class="chart-title">${esc(title)}</div>${entries.map(([k,v]) => `<div class="bar-row"><div class="bar-label" title="${esc(k)}">${esc(label(k))}</div><div class="track"><div class="fill" style="width:${Math.max(4, Math.round(v / max * 100))}%"></div></div><strong>${v}</strong></div>`).join("")}</div>`; }
function renderTimeline(table){ if(!table.time_col || !table.rows.length) return `<div class="chart"><div class="chart-title">Recent Activity</div><div class="empty">No timestamped rows.</div></div>`; const days = 14; const now = new Date(snapshot.generated_at); const buckets = Array.from({length:days}, () => 0); for(const row of table.rows){ const d = new Date(row[table.time_col]); if(Number.isNaN(d.getTime())) continue; const diff = Math.floor((Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()) - Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate())) / 86400000); if(diff >= 0 && diff < days) buckets[days - 1 - diff] += 1; } const max = Math.max(...buckets, 1); return `<div class="chart"><div class="chart-title">Recent Activity</div><div class="timeline">${buckets.map(v => `<div class="day ${v ? "" : "zero"}" title="${v} rows" style="height:${v ? Math.max(8, Math.round(v / max * 84)) : 5}px"></div>`).join("")}</div><div class="cell-sub">Last ${days} days, oldest to newest</div></div>`; }
function renderVisuals(table){ return `<div class="visuals">${renderBars(table.status_col ? "Status Distribution" : "Top Groups", table.status_col ? table.summary.status_counts : table.summary.top_groups)}${renderTimeline(table)}</div>`; }
function columnsFor(table, rows){ const available = new Set(Object.keys(rows[0] || {})); const preferred = (preferredColumns[table.name] || []).filter(c => available.has(c)); const rest = [...available].filter(c => !preferred.includes(c)); return [...preferred, ...rest].slice(0, 9); }
function renderMetrics(table){ const status = table.summary.status_counts || {}; const groups = table.summary.top_groups || {}; const topStatus = Object.entries(status).slice(0,2).map(([k,v]) => `${label(k)}: ${v}`).join(", ") || "-"; const topGroup = Object.entries(groups).slice(0,2).map(([k,v]) => `${k}: ${v}`).join(", ") || "-"; return `<div class="metrics"><div class="metric"><strong>${table.summary.row_count}</strong><span>Rows</span></div><div class="metric"><strong>${esc(topStatus)}</strong><span>Status mix</span></div><div class="metric"><strong>${esc(topGroup)}</strong><span>Top group</span></div><div class="metric"><strong>${esc(compactDate(table.summary.latest))}</strong><span>Latest</span></div></div>`; }
function renderTable(table){ const rows = table.rows.filter(rowMatches); if(!rows.length){ const msg = table.error ? `<span class="err">${esc(table.error)}</span>` : "No rows match the current filters."; return `<div class="empty">${msg}</div>`; } const columns = columnsFor(table, rows); return `<div class="table-wrap"><table><thead><tr>${columns.map(c => `<th>${esc(label(c))}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${columns.map(c => `<td>${renderValue(c, row[c])}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`; }
function renderGrid(){ const tables = currentTables(); document.getElementById("grid").innerHTML = tables.map(t => `<article class="card"><div class="card-head"><div><div class="card-title">${esc(t.label)}</div><div class="desc">${esc(t.description)}</div></div><div class="badge">${t.rows.length}</div></div>${renderMetrics(t)}${renderVisuals(t)}${renderTable(t)}</article>`).join("") || `<div class="empty">No dashboards configured.</div>`; }
function render(){ renderTabs(); renderFilter(); renderHero(); renderOverview(); renderGrid(); }
search.addEventListener("input", renderGrid);
tableFilter.addEventListener("change", render);
render();
</script>
