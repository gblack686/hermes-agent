name: Docs Site Checks

on:
  workflow_call:

permissions:
  contents: read

jobs:
  docs-site-checks:
    name: Build docs site
    uses: gbauto/gbautomation/.github/workflows/reusable-pr-gate.yml@5bcb4f40e0dc65d5c5f838bbd16794bda185940d
    permissions:
      contents: read
    with:
      repo_profile: gblack686-hermes-agent
      language: mixed
      python_versions: '["3.11"]'
      node_versions: '["22"]'
      actionlint_enabled: false
      required_check_alias: Build docs site
      install_command: |
        npm ci --prefix website
        python -m pip install ascii-guard==2.3.0 pyyaml==6.0.3
      build_command: |
        python3 website/scripts/extract-skills.py
        python3 website/scripts/generate-skill-docs.py
        npm --prefix website run lint:diagrams
        npm --prefix website run build
