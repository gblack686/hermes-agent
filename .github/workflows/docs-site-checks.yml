name: Docs Site Checks
permissions:
  contents: read
jobs:
  docs-site-checks:
    name: Build docs site
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      REPO_PROFILE: gblack686-hermes-agent
      LANGUAGE_HINT: mixed
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: |-
        npm ci --prefix website
        python -m pip install ascii-guard==2.3.0 pyyaml==6.0.3
    - name: Run build command
      run: |-
        python3 website/scripts/extract-skills.py
        python3 website/scripts/generate-skill-docs.py
        npm --prefix website run lint:diagrams
        npm --prefix website run build
'on':
  workflow_call: null
