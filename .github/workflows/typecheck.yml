name: Typecheck
permissions:
  contents: read
jobs:
  typecheck:
    name: Check TypeScript
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      REPO_PROFILE: gblack686-hermes-agent
      LANGUAGE_HINT: node
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci --ignore-scripts
    - name: Run test command
      run: |-
        set -euo pipefail
        for package in ui-tui web apps/bootstrap-installer apps/desktop apps/shared; do
          npm run --prefix "$package" typecheck
        done
  desktop-build:
    name: Build desktop app
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      REPO_PROFILE: gblack686-hermes-agent
      LANGUAGE_HINT: node
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run build command
      run: npm run --prefix apps/desktop build
'on':
  workflow_call: null
