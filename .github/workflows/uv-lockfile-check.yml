name: uv.lock check
permissions:
  contents: read
concurrency:
  group: uv-lockfile-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: uv lock --check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      REPO_PROFILE: gblack686-hermes-agent
      LANGUAGE_HINT: python
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: python -m pip install uv
    - name: Run test command
      run: "if ! uv lock --check; then\n  cat <<'EOF' >> \"$GITHUB_STEP_SUMMARY\"\n## \u274C uv.lock is out of sync with pyproject.toml\n\
        \n**If this is a PR:** this check runs against the merged state\n(your branch + current `main`), not just your branch.\
        \  If\n`uv lock --check` passes locally, your branch is likely behind\n`main` \u2014 recent changes to `pyproject.toml`\
        \ on `main` aren't\nreflected in your branch's `uv.lock` yet.\n\nTo fix, sync with main and regenerate the lockfile:\n\
        \n```bash\ngit fetch origin main\ngit rebase origin/main   # or `git merge origin/main`\nuv lock                 \
        \ # regenerate against new pyproject.toml\ngit add uv.lock\ngit commit -m \"chore: refresh uv.lock after syncing with\
        \ main\"\ngit push --force-with-lease  # drop --force-with-lease if you merged\n```\n\n**If you only changed pyproject.toml:**\
        \ run `uv lock` locally\nand commit the result.\n\nThis check is blocking because the Docker image build uses\n`uv\
        \ sync --frozen --extra all`, which rejects stale lockfiles\n\u2014 catching it here avoids a ~15 min failed docker\
        \ run\non `main` post-merge.\nEOF\n  echo \"::error title=uv.lock out of sync::Run \\`uv lock\\` locally and commit\
        \ the result. If on a PR, sync with main first.\"\n  exit 1\nfi"
'on':
  workflow_call: null
